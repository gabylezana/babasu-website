<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Babasu Ventures — The seeds that will become the forest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Inter+Tight:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #0A1F1A;
      --bg-deep: #071613;
      --surface: #102A22;
      --surface-alt: #15362C;
      --fg: #F2EDE0;
      --fg-muted: rgba(242,237,224,0.62);
      --fg-faint: rgba(242,237,224,0.32);
      --line: rgba(242,237,224,0.14);
      --line-strong: rgba(242,237,224,0.28);
      --accent: #1F4D3C;
      --cta: #D97A3B;
      --cta-hover: #E58A4B;
      --cta-ink: #0A1F1A;
      --gold: #B8A673;
      --font-display: 'Inter Tight', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-body: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      --display-weight: 500;
      --display-tracking: -0.035em;
      --cta-intensity: 1;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
    body { overflow-x: hidden; }
    ::selection { background: var(--cta); color: var(--cta-ink); }
    a { color: inherit; }
    html { scroll-behavior: smooth; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fg-faint); }

    /* mobile */
    @media (max-width: 900px) {
      header nav { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="src/tokens.jsx"></script>
  <script type="text/babel" src="src/hooks.jsx"></script>
  <script type="text/babel" src="src/chrome.jsx"></script>
  <script type="text/babel" src="src/hero.jsx"></script>
  <script type="text/babel" src="src/philosophy.jsx"></script>
  <script type="text/babel" src="src/portfolio.jsx"></script>
  <script type="text/babel" src="src/team.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "ivory",
      "type": "sohne",
      "ctaIntensity": 0.95
    }/*EDITMODE-END*/;

    function App() {
      const [state, setState] = useState(TWEAK_DEFAULTS);
      const [tweaksVisible, setTweaksVisible] = useState(false);

      useEffect(() => {
        applyTheme(state.palette, state.type, state.ctaIntensity);
      }, [state]);

      useEffect(() => {
        const onMsg = (e) => {
          const d = e.data || {};
          if (d.type === '__activate_edit_mode') setTweaksVisible(true);
          if (d.type === '__deactivate_edit_mode') setTweaksVisible(false);
        };
        window.addEventListener('message', onMsg);
        // signal availability after listener is live
        window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      return (
        <div>
          <Header />
          <main>
            <Hero />
            <Philosophy />
            <Manifesto />
            <LogoStrip />
            <Portfolio />
            <Numbers />
            <Team />
          </main>
          <Footer />
          <TweaksPanel state={state} setState={setState} visible={tweaksVisible} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
